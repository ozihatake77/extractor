<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="Scan KTP & KK - Convert foto ke text otomatis">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Extractor">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
    <title>Extractor - Scan KTP & KK</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <span class="logo-icon">📄</span>
                <h1>Extractor</h1>
            </div>
            <p class="subtitle">Scan KTP & KK → Text Otomatis</p>
        </header>

        <!-- Doc Type Selector -->
        <div class="doc-selector">
            <button class="doc-btn active" data-type="ktp" id="btn-ktp">
                <span class="doc-icon">🪪</span>
                <span>KTP</span>
            </button>
            <button class="doc-btn" data-type="kk" id="btn-kk">
                <span class="doc-icon">👨‍👩‍👧‍👦</span>
                <span>KK</span>
            </button>
        </div>

        <!-- Engine Selector -->
        <div class="engine-selector" id="engine-selector" style="display:none;">
            <button class="engine-btn active" data-engine="tesseract" id="btn-tesseract">
                <span>⚡</span> Tesseract (Cepat)
            </button>
            <button class="engine-btn" data-engine="google" id="btn-google">
                <span>🎯</span> Google Vision (Akurat)
            </button>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" id="upload-area">
            <div class="upload-content">
                <div class="upload-icon">📸</div>
                <p class="upload-text">Tap untuk upload foto</p>
                <p class="upload-hint">KTP atau KK</p>
            </div>
            <input type="file" id="file-input" accept="image/*" hidden>
        </div>

        <!-- Preview -->
        <div class="preview-area" id="preview-area" style="display:none;">
            <img id="preview-img" src="" alt="Preview">
            <div class="preview-actions">
                <button class="btn btn-scan" id="btn-scan">
                    <span>🔍</span> Scan Sekarang
                </button>
                <button class="btn btn-reset" id="btn-reset">
                    <span>🔄</span> Ulang
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div class="loading" id="loading" style="display:none;">
            <div class="spinner"></div>
            <p>Memproses dokumen...</p>
            <p class="loading-hint" id="loading-hint">Tunggu sebentar...</p>
        </div>

        <!-- Result -->
        <div class="result-area" id="result-area" style="display:none;">
            <div class="result-header">
                <h2 id="result-title">📋 Hasil Scan</h2>
                <div class="result-actions">
                    <button class="btn btn-copy" id="btn-copy" title="Copy">📋 Copy</button>
                    <button class="btn btn-new" id="btn-new">➕ Scan Baru</button>
                </div>
            </div>
            
            <!-- Engine badge -->
            <div class="engine-badge" id="engine-badge"></div>
            
            <!-- Parsed Data as Table -->
            <div class="result-section">
                <h3>📝 Data Terparse</h3>
                <table class="data-table" id="parsed-table">
                    <tbody id="parsed-data"></tbody>
                </table>
            </div>
            
            <!-- Raw Text (collapsible) -->
            <div class="result-section">
                <details>
                    <summary class="raw-toggle">📄 Teks Mentah (Raw OCR)</summary>
                    <div class="raw-text" id="raw-text"></div>
                </details>
            </div>
        </div>

        <footer class="footer">
            <p>⚡ Extractor PWA by Yamada</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
